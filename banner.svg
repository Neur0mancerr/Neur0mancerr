<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Bastian C. — Cybersecurity Operations Analyst</title>
  <desc>Terminal-style green-on-black GitHub profile banner</desc>

  <rect width="900" height="200" fill="#050d08"/>

  <!-- scanlines -->
  <rect width="900" height="200" fill="url(#scan)" opacity="0.4"/>
  <defs>
    <pattern id="scan" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="2" fill="none"/>
      <rect x="0" y="2" width="1" height="2" fill="#00ff41" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- border frame -->
  <rect x="10" y="10" width="880" height="180" fill="none" stroke="#00ff41" stroke-width="0.8" stroke-opacity="0.3" rx="4"/>
  <rect x="14" y="14" width="872" height="172" fill="none" stroke="#00ff41" stroke-width="0.4" stroke-opacity="0.15" rx="3"/>

  <!-- corner decorations -->
  <line x1="10" y1="40" x2="30" y2="40" stroke="#00ff41" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="10" y1="160" x2="30" y2="160" stroke="#00ff41" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="870" y1="40" x2="890" y2="40" stroke="#00ff41" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="870" y1="160" x2="890" y2="160" stroke="#00ff41" stroke-width="1" stroke-opacity="0.6"/>

  <!-- top label -->
  <text x="30" y="32" font-family="'Courier New', monospace" font-size="9" fill="#00ff41" fill-opacity="0.5" letter-spacing="3">FILE: AGENT_PROFILE_7743.DAT  //  CLEARANCE: LEVEL-5  //  STATUS: ACTIVE</text>

  <!-- alien ASCII shape (simplified geometric) -->
  <g transform="translate(48, 55)" fill="none" stroke="#00ff41" stroke-opacity="0.7" stroke-width="1">
    <ellipse cx="22" cy="28" rx="18" ry="22" stroke-opacity="0.4"/>
    <ellipse cx="22" cy="24" rx="10" ry="8"/>
    <circle cx="17" cy="22" r="2.5" fill="#00ff41" fill-opacity="0.8" stroke="none"/>
    <circle cx="27" cy="22" r="2.5" fill="#00ff41" fill-opacity="0.8" stroke="none"/>
    <line x1="14" y1="18" x2="6"  y2="10"/>
    <line x1="30" y1="18" x2="38" y2="10"/>
    <line x1="16" y1="32" x2="12" y2="42"/>
    <line x1="28" y1="32" x2="32" y2="42"/>
    <line x1="14" y1="36" x2="9"  y2="44"/>
    <line x1="30" y1="36" x2="35" y2="44"/>
  </g>

  <!-- main name -->
  <text x="110" y="90" font-family="'Courier New', monospace" font-size="42" font-weight="700" fill="#00ff41" letter-spacing="4">BASTIAN C.</text>

  <!-- title line -->
  <text x="112" y="118" font-family="'Courier New', monospace" font-size="13" fill="#00ff41" fill-opacity="0.65" letter-spacing="3">// CYBERSECURITY OPERATIONS ANALYST //</text>

  <!-- divider -->
  <line x1="110" y1="130" x2="860" y2="130" stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- badges row -->
  <g font-family="'Courier New', monospace" font-size="10" fill="#00ff41" fill-opacity="0.55" letter-spacing="1">
    <circle cx="116" cy="148" r="3" fill="#00ff41" fill-opacity="0.7"/>
    <text x="124" y="152">Microsoft Sentinel</text>
    <circle cx="256" cy="148" r="3" fill="#00ff41" fill-opacity="0.7"/>
    <text x="264" y="152">KQL</text>
    <circle cx="298" cy="148" r="3" fill="#00ff41" fill-opacity="0.7"/>
    <text x="306" y="152">Defender XDR</text>
    <circle cx="428" cy="148" r="3" fill="#00ff41" fill-opacity="0.7"/>
    <text x="436" y="152">SOAR / Logic Apps</text>
    <circle cx="568" cy="148" r="3" fill="#00ff41" fill-opacity="0.7"/>
    <text x="576" y="152">Wiz · Lacework</text>
    <circle cx="694" cy="148" r="3" fill="#00ff41" fill-opacity="0.7"/>
    <text x="702" y="152">ThreatLocker</text>
  </g>

  <!-- quote -->
  <text x="112" y="174" font-family="'Courier New', monospace" font-size="10" fill="#00ff41" fill-opacity="0.35" font-style="italic">"The truth is out there. So is the threat actor."</text>

  <!-- blinking cursor (static in SVG) -->
  <rect x="818" y="162" width="7" height="13" fill="#00ff41" fill-opacity="0.8"/>

  <!-- bottom right label -->
  <text x="842" y="186" font-family="'Courier New', monospace" font-size="8" fill="#00ff41" fill-opacity="0.3" text-anchor="end" letter-spacing="1">SC-200 · 5+ YRS · CL → LV → DE</text>
</svg>
